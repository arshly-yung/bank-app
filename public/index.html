<!DOCTYPE html>
<html>
<head>
<title>GLOBAL TRUST BANK</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f2c;
  color:white;
}

/* HEADER */
.header{
  background:linear-gradient(135deg,#1e3c72,#2a5298);
  padding:20px;
  font-size:20px;
  font-weight:bold;
}

/* CONTAINER */
.container{
  padding:15px;
}

/* CARD */
.card{
  background:#151a4f;
  border-radius:18px;
  padding:20px;
  margin-bottom:15px;
  box-shadow:0 10px 20px rgba(0,0,0,0.5);
}

/* BALANCE */
.balance{
  font-size:32px;
  color:#00ff99;
}

.yen{
  color:#aaa;
  font-size:14px;
}

/* ACTIONS */
.actions{
  display:flex;
  justify-content:space-between;
  margin-top:10px;
}

.action{
  width:30%;
  background:#1d2766;
  padding:12px;
  text-align:center;
  border-radius:10px;
}

/* INPUT */
input{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  margin-top:10px;
}

/* BUTTON */
button{
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#00c853;
  color:white;
  font-weight:bold;
}

/* CRYPTO TABLE */
.crypto-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

.crypto-name{
  font-weight:bold;
}

.green{
  color:#00e676;
}

.red{
  color:#ff5252;
}

/* MINI CHART */
canvas{
  width:80px !important;
  height:30px !important;
}
</style>

</head>

<body>

<div class="header">GLOBAL TRUST BANK</div>

<div class="container">

<div class="card">
<h3>Available Balance</h3>
<div class="balance" id="usd">$10,000,000</div>
<div class="yen" id="yen">≈ ¥1,500,000,000</div>

<div class="actions">
<div class="action">💸 Send</div>
<div class="action">📱 Airtime</div>
<div class="action">💡 Bills</div>
</div>
</div>

<div class="card">
<input placeholder="Enter amount">
<button>Deposit</button>
<button>Withdraw</button>
</div>

<div class="card">
<h3>Transfer</h3>
<input placeholder="Account Number">
<input placeholder="Enter PIN">
<button>Send Money</button>
</div>

<div class="card">
<h3>Crypto Market</h3>

<div class="crypto-row">
<div>
<div class="crypto-name">BTC</div>
<div id="btcPrice">$78,000</div>
</div>
<canvas id="btcChart"></canvas>
<div id="btcChange" class="green">+2.4%</div>
</div>

<div class="crypto-row">
<div>
<div class="crypto-name">ETH</div>
<div id="ethPrice">$2,300</div>
</div>
<canvas id="ethChart"></canvas>
<div id="ethChange" class="green">+1.8%</div>
</div>

<div class="crypto-row">
<div>
<div class="crypto-name">XRP</div>
<div id="xrpPrice">$0.60</div>
</div>
<canvas id="xrpChart"></canvas>
<div id="xrpChange" class="red">-0.5%</div>
</div>

</div>

<div class="card">
<h3>Support</h3>
globaltrustsupport@gmail.com
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

/* USD → YEN */
let usd = 10000000;
let rate = 150;
document.getElementById("yen").innerText = "≈ ¥" + (usd*rate).toLocaleString();

/* RANDOM PRICE UPDATE */
function updatePrices(){
  let btc = 78000 + Math.random()*2000;
  let eth = 2300 + Math.random()*200;
  let xrp = 0.5 + Math.random()*0.2;

  document.getElementById("btcPrice").innerText = "$" + btc.toFixed(0);
  document.getElementById("ethPrice").innerText = "$" + eth.toFixed(0);
  document.getElementById("xrpPrice").innerText = "$" + xrp.toFixed(2);
}
setInterval(updatePrices,2000);

/* MINI CHART FUNCTION */
function createChart(id,color){
  return new Chart(document.getElementById(id),{
    type:'line',
    data:{
      labels:[1,2,3,4,5,6],
      datasets:[{
        data:[5,6,7,6,8,9],
        borderColor:color,
        borderWidth:2,
        fill:false,
        tension:0.4
      }]
    },
    options:{
      plugins:{legend:{display:false}},
      scales:{x:{display:false},y:{display:false}}
    }
  });
}

/* CREATE CHARTS */
createChart("btcChart","#00e676");
createChart("ethChart","#00e676");
createChart("xrpChart","#ff5252");

</script>

</body>
</html>
