<!DOCTYPE html>
<html>
<head>
<title>GLOBAL TRUST BANK</title>
<style>
body { font-family: Arial; background:#0c0f2c; color:white; text-align:center; }
.container { max-width:400px; margin:auto; margin-top:40px; }
input,button { width:100%; padding:10px; margin:5px 0; }
.card { background:#1a1f4a; padding:20px; border-radius:10px; }
</style>
</head>

<body>

<div class="container" id="auth">
<h2>GLOBAL TRUST BANK</h2>

<input id="username" placeholder="Username">
<input id="password" placeholder="Password">
<input id="pin" placeholder="PIN">

<button onclick="register()">Create Account</button>
<button onclick="login()">Login</button>
</div>

<div class="container" id="dashboard" style="display:none">
<h3>Welcome <span id="user"></span></h3>

<div class="card">
Balance: $<span id="balance"></span>
</div>

<input id="amount" placeholder="Amount">

<h4>Transfer</h4>
<input id="toAcc" placeholder="Account Number">
<input id="pin2" placeholder="Enter PIN">
<button onclick="transfer()">Send Money</button>

<h4>Crypto Prices</h4>
<div id="crypto"></div>

<h4>History</h4>
<ul id="history"></ul>

<p>Support: globaltrustsupport@gmail.com</p>
</div>

<script>
let currentUser = null;

async function register(){
  let res = await fetch("/register", {
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      username:username.value,
      password:password.value,
      pin:pin.value
    })
  });
  alert((await res.json()).message);
}

async function login(){
  let res = await fetch("/login", {
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      username:username.value,
      password:password.value
    })
  });

  let data = await res.json();

  if(data.message==="success"){
    currentUser = data;
    auth.style.display="none";
    dashboard.style.display="block";

    user.innerText = data.username;
    load();
  } else {
    alert("Login failed");
  }
}

function load(){
  balance.innerText = currentUser.user.balance;
  history.innerHTML = "";

  currentUser.user.history.forEach(h=>{
    history.innerHTML += `<li>${h.type} - $${h.amount} (${h.note})</li>`;
  });

  loadCrypto();
}

async function transfer(){
  let res = await fetch("/transfer", {
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      fromUser:currentUser.username,
      toAccount:toAcc.value,
      amount:Number(amount.value),
      pin:pin2.value
    })
  });

  let data = await res.json();
  alert(data.message);

  if(data.balance){
    currentUser.user.balance = data.balance;
    load();
  }
}

async function loadCrypto(){
  let res = await fetch("/crypto");
  let data = await res.json();

  crypto.innerHTML = `
  BTC: $${data.bitcoin.usd}<br>
  ETH: $${data.ethereum.usd}<br>
  XRP: $${data.ripple.usd}
  `;
}
</script>

</body>
</html>
