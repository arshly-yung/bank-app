<!DOCTYPE html>
<html>
<head>
  <title>Global Trust Bank</title>
 
  <style>
body {
  margin: 0;
  font-family: Arial;
  background: #f2f2f7;
}

.container {
  padding: 15px;
}

/* LOGIN */
.login-card {
  background: #1c1c1e;
  padding: 20px;
  border-radius: 15px;
  color: white;
  margin-top: 100px;
  text-align: center;
}

.login-card input {
  width: 90%;
  margin: 10px 0;
  padding: 10px;
}

.login-card button {
  padding: 10px 20px;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}

/* BALANCE CARD */
.card {
  background: linear-gradient(135deg, #7b2ff7, #3a7bd5);
  color: white;
  padding: 20px;
  border-radius: 15px;
}

.card-top {
  display: flex;
  justify-content: space-between;
}

.card h1 {
  margin: 10px 0;
}

.card button {
  background: white;
  border: none;
  padding: 10px;
  border-radius: 20px;
}

/* ACTIONS */
.actions {
  margin-top: 15px;
}

.actions input {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
}

.actions button {
  width: 48%;
  padding: 10px;
  margin: 1%;
}

/* SERVICES */
.services {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-top: 20px;
}

.service {
  background: white;
  padding: 10px;
  text-align: center;
  border-radius: 10px;
}

/* HISTORY */
.history {
  background: white;
  padding: 10px;
  border-radius: 10px;
  margin-top: 20px;
}
</style>

</head>

<body>

<div class="container">

  <!-- LOGIN -->
  <div id="loginSection" class="login-card">
    <h2>Global Trust Bank</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" style="display:none;">

    <!-- HEADER -->
    <div class="header">
      <h3>Hi, Thomas</h3>
      <span>🔔</span>
    </div>

    <!-- BALANCE -->
    <div class="card">
      <div class="card-top">
        <span>Available Balance</span>
        <span>👁️</span>
      </div>
      <h1>$<span id="balance">0</span></h1>
      <button onclick="deposit()">Add Money</button>
    </div>

    <!-- ACTIONS -->
    <div class="actions">
      <input type="number" id="amount" placeholder="Enter amount">
      <button onclick="deposit()">Deposit</button>
      <button onclick="withdraw()">Withdraw</button>
    </div>

    <!-- SERVICES -->
    <div class="services">
      <div class="service">🏦<p>To Bank</p></div>
      <div class="service">📱<p>Airtime</p></div>
      <div class="service">💾<p>Savings</p></div>
      <div class="service">💳<p>Card</p></div>
      <div class="service">🌐<p>Data</p></div>
      <div class="service">⚡<p>Electricity</p></div>
      <div class="service">🎯<p>Betting</p></div>
      <div class="service">➕<p>More</p></div>
    </div>

    <!-- HISTORY -->
    <div class="history">
      <h3>Transaction History</h3>
      <ul id="history"></ul>
    </div>

  </div>

</div>

</body>
</div>

<script>
let balance = 5000000;
let history = [];

function login() {
  let user = document.getElementById("username").value;
  let pass = document.getElementById("password").value;

  if (user === "admin" && pass === "1234") {
    document.getElementById("loginSection").style.display = "none";
    document.getElementById("dashboard").style.display = "block";

    loadData();
  } else {
    alert("Wrong login details");
  }
}

function loadData() {
  balance = Number(localStorage.getItem("balance")) || 5000000;
  history = JSON.parse(localStorage.getItem("history")) || [];

  updateUI();
}

function saveData() {
  localStorage.setItem("balance", balance);
  localStorage.setItem("history", JSON.stringify(history));
}

function updateUI() {
  document.getElementById("balance").innerText =
    balance.toLocaleString();

  let list = document.getElementById("history");
  list.innerHTML = "";

  history.forEach(item => {
    let li = document.createElement("li");
    li.innerText = item;
    list.appendChild(li);
  });
}

function deposit() {
  let amount = Number(document.getElementById("amount").value);
  if (!amount) return;

  balance += amount;
  history.push("Deposited $" + amount);

  saveData();
  updateUI();
}

function withdraw() {
  let amount = Number(document.getElementById("amount").value);
  if (!amount) return;

  balance -= amount;
  history.push("Withdrew $" + amount);

  saveData();
  updateUI();
}
</script>
</body>
</html>
