<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GLOBAL TRUST BANK</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f2a;
  color:white;
}

/* HEADER */
.header{
  background:linear-gradient(135deg,#1e3c72,#2a5298);
  padding:20px;
  font-size:22px;
  font-weight:bold;
}

/* CARDS */
.container{padding:15px;}

.card{
  background:#141c4f;
  border-radius:15px;
  padding:20px;
  margin-bottom:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.4);
}

/* BALANCE */
.balance{
  font-size:30px;
  color:#00ff99;
}

.yen{
  font-size:14px;
  color:#ccc;
}

/* INPUTS */
input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:none;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#2ecc71;
  color:white;
  font-size:15px;
}

/* ACTION GRID */
.actions{
  display:flex;
  justify-content:space-between;
  text-align:center;
}

.action{
  width:30%;
  background:#1d2766;
  padding:15px;
  border-radius:10px;
}

/* CRYPTO */
.crypto{
  display:flex;
  justify-content:space-between;
  margin:10px 0;
}

/* NOTICE */
.notice{
  background:#222;
  padding:10px;
  border-radius:8px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="header" id="title">GLOBAL TRUST BANK</div>

<div class="container">

<!-- BALANCE -->
<div class="card">
  <div id="balanceLabel">Available Balance</div>
  <div class="balance">$10,000,000</div>
  <div class="yen" id="yen"></div>
</div>

<!-- ACTIONS -->
<div class="card">
  <div class="actions">
    <div class="action">Send</div>
    <div class="action">Airtime</div>
    <div class="action">Bills</div>
  </div>
</div>

<!-- TRANSACTION -->
<div class="card">
  <input id="amount" placeholder="Enter amount">
  <button onclick="deposit()" id="depositBtn">Deposit</button>
  <button onclick="withdraw()" id="withdrawBtn">Withdraw</button>
</div>

<!-- TRANSFER -->
<div class="card">
  <h3 id="transferTitle">Transfer</h3>
  <input id="accNum" placeholder="Account Number">
  <input id="pin" placeholder="Enter PIN">
  <button onclick="sendMoney()" id="sendBtn">Send Money</button>
</div>

<!-- CRYPTO -->
<div class="card">
  <h3 id="cryptoTitle">Crypto Market</h3>

  <div class="crypto">
    <span>BTC</span><span id="btc"></span>
  </div>

  <div class="crypto">
    <span>ETH</span><span id="eth"></span>
  </div>

  <div class="crypto">
    <span>XRP</span><span id="xrp"></span>
  </div>
</div>

<!-- HISTORY -->
<div class="card">
  <h3 id="historyTitle">History</h3>
  <div id="history"></div>
</div>

<!-- SUPPORT -->
<div class="card">
  <h3 id="supportTitle">Support</h3>
  globaltrustsupport@gmail.com
</div>

<div id="notice"></div>

</div>

<script>
let balance = 10000000;
let history = [];
let userPin = "1234";

/* USD → JPY conversion (~150 rate) */
function updateYen(){
  let yen = balance * 150;
  document.getElementById("yen").innerText =
    "≈ ¥" + yen.toLocaleString();
}

function update(){
  document.getElementById("history").innerHTML =
    history.slice().reverse().join("<br>");
}

function notify(msg){
  document.getElementById("notice").innerHTML =
    "<div class='notice'>" + msg + "</div>";
}

function deposit(){
  let amt = Number(amount.value);
  history.push("Deposited $" + amt);
  notify("Deposit successful");
  update();
}

function withdraw(){
  let amt = Number(amount.value);
  history.push("Withdrew $" + amt);
  notify("Withdrawal successful");
  update();
}

function sendMoney(){
  if(pin.value !== userPin){
    notify("Wrong PIN");
    return;
  }
  history.push("Sent $" + amount.value + " to " + accNum.value);
  notify("Transfer successful");
  update();
}

/* FAKE LIVE CRYPTO */
function crypto(){
  btc.innerText = "$" + (78000 + Math.random()*1000).toFixed(0);
  eth.innerText = "$" + (2300 + Math.random()*200).toFixed(0);
  xrp.innerText = "$" + (0.5 + Math.random()*0.2).toFixed(2);
}
setInterval(crypto,2000);
