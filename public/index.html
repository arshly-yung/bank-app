<!DOCTYPE html>
<html>
<head>
<title>GLOBAL TRUST BANK</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0a0f2c;
  color:white;
}

.container {
  padding:20px;
}

.card {
  background:#121a4a;
  padding:20px;
  border-radius:15px;
  margin-bottom:20px;
}

.balance {
  font-size:26px;
  color:#00ff99;
}

input {
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:8px;
  border:none;
}

button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#4CAF50;
  color:white;
  font-size:16px;
}

.crypto {
  display:flex;
  justify-content:space-between;
  margin:10px 0;
}

.small {
  font-size:14px;
  color:#ccc;
}
</style>
</head>

<body>

<div class="container">

<h2>GLOBAL TRUST BANK</h2>

<div class="card">
  <p>Available Balance</p>
  <div id="balance" class="balance">$10,000,000</div>
</div>

<div class="card">
  <input id="amount" placeholder="Enter amount">
  <button onclick="deposit()">Deposit</button>
  <button onclick="withdraw()">Withdraw</button>
</div>

<div class="card">
  <h3>Transfer</h3>
  <input placeholder="Account Number">
  <input placeholder="Enter PIN">
  <button onclick="alert('Transfer Sent')">Send Money</button>
</div>

<div class="card">
  <h3>Crypto Prices</h3>

  <div class="crypto">
    <span>Bitcoin (BTC)</span>
    <span id="btc">$78,000</span>
  </div>

  <div class="crypto">
    <span>Ethereum (ETH)</span>
    <span id="eth">$2,300</span>
  </div>

  <div class="crypto">
    <span>XRP</span>
    <span id="xrp">$0.60</span>
  </div>

</div>

<div class="card">
  <h3>Support</h3>
  <p class="small">globaltrustsupport@gmail.com</p>
</div>

</div>

<script>
let balance = 10000000;

function update() {
  document.getElementById("balance").innerText = "$" + balance.toLocaleString();
}

function deposit() {
  let amt = Number(document.getElementById("amount").value);
  balance += amt;
  update();
}

function withdraw() {
  let amt = Number(document.getElementById("amount").value);
  balance -= amt;
  update();
}

update();
</script>

</body>
</html>
