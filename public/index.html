<!DOCTYPE html>
<html>
<head>
  <title>Global Trust Bank</title>
 
  <style>
body {
  margin: 0;
  font-family: Arial;
  background: #f2f2f7;
}

.container {
  padding: 15px;
}

/* LOGIN */
.login-card {
  background: #1c1c1e;
  padding: 20px;
  border-radius: 15px;
  color: white;
  margin-top: 100px;
  text-align: center;
}

.login-card input {
  width: 90%;
  margin: 10px 0;
  padding: 10px;
}

.login-card button {
  padding: 10px 20px;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}

/* BALANCE CARD */
.card {
  background: linear-gradient(135deg, #7b2ff7, #3a7bd5);
  color: white;
  padding: 20px;
  border-radius: 15px;
}

.card-top {
  display: flex;
  justify-content: space-between;
}

.card h1 {
  margin: 10px 0;
}

.card button {
  background: white;
  border: none;
  padding: 10px;
  border-radius: 20px;
}

/* ACTIONS */
.actions {
  margin-top: 15px;
}

.actions input {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
}

.actions button {
  width: 48%;
  padding: 10px;
  margin: 1%;
}

/* SERVICES */
.services {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-top: 20px;
}

.service {
  background: white;
  padding: 10px;
  text-align: center;
  border-radius: 10px;
}

/* HISTORY */
.history {
  background: white;
  padding: 10px;
  border-radius: 10px;
  margin-top: 20px;
}
</style>

</head>

<body>

<div class="container">

  <!-- LOGIN -->
  <div id="loginSection" class="login-card">
    <h2>Global Trust Bank</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" style="display:none;">

    <!-- HEADER -->
    <div class="header">
      <h3>Hi, shinichi</h3>
      <span>🔔</span>
    </div>

    <!-- BALANCE -->
    <div class="card">
      <div class="card-top">
        <span>Available Balance</span>
        <span>👁️</span>
      </div>
      <h1>$<span id="balance">0</span></h1>
      <button onclick="deposit()">Add Money</button>
    </div>

    <!-- ACTIONS -->
    <div class="actions">
      <input type="number" id="amount" placeholder="Enter amount">
      <button onclick="deposit()">Deposit</button>
      <button onclick="withdraw()">Withdraw</button>
    </div>

    <!-- SERVICES -->
    <div class="services">
      <div class="service">🏦<p>To Bank</p></div>
      <div class="service">📱<p>Airtime</p></div>
      <div class="service">💾<p>Savings</p></div>
      <div class="service">💳<p>Card</p></div>
      <div class="service">🌐<p>Data</p></div>
      <div class="service">⚡<p>Electricity</p></div>
      <div class="service">🎯<p>Betting</p></div>
      <div class="service">➕<p>More</p></div>
    </div>

    <!-- HISTORY -->
    <div class="history">
      <h3>Transaction History</h3>
      <ul id="history"></ul>
    </div>

  </div>

</div>

</body>
</div>

<script>

let users = JSON.parse(localStorage.getItem("users")) || {
  "thomas": { password: "1234", balance: 5000000, history: [] },
  "shinichi": { password: "1111", balance: 10000000, history: [] }
};

let currentUser = null;

function login() {
  let user = document.getElementById("username").value.toLowerCase();
  let pass = document.getElementById("password").value;

  if (users[user] && users[user].password === pass) {
    currentUser = user;

    document.getElementById("loginSection").style.display = "none";
    document.getElementById("dashboard").style.display = "block";

    document.getElementById("userName").innerText = user;

    updateUI();
  } else {
    alert("Wrong login details");
  }
}

function updateUI() {
  let userData = users[currentUser];

  document.getElementById("balance").innerText =
    "$" + userData.balance.toLocaleString() + ".00";

  let list = document.getElementById("history");
  list.innerHTML = "";

  userData.history.forEach(item => {
    let li = document.createElement("li");
    li.innerText = item;
    list.appendChild(li);
  });
}

function deposit() {
  let amount = Number(document.getElementById("amount").value);
  if (!amount) return;

  users[currentUser].balance += amount;
  users[currentUser].history.push("Deposited $" + amount);

  localStorage.setItem("users", JSON.stringify(users));

  updateUI();
}

function withdraw() {
  let amount = Number(document.getElementById("amount").value);
  if (!amount) return;

  if (amount > users[currentUser].balance) {
    alert("Insufficient funds");
    return;
  }

  users[currentUser].balance -= amount;
  users[currentUser].history.push("Withdrew $" + amount);

  localStorage.setItem("users", JSON.stringify(users));

  updateUI();
}

</script>
</body>
</html>
