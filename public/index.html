<!DOCTYPE html>
<html>
<head>
<title>GLOBAL TRUST BANK</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f2a;
  color:white;
}

.container{
  padding:20px;
}

.header{
  font-size:22px;
  font-weight:bold;
  margin-bottom:20px;
}

.card{
  background:#131a4d;
  border-radius:15px;
  padding:20px;
  margin-bottom:15px;
  box-shadow:0 0 10px rgba(0,0,0,0.3);
}

.balance{
  font-size:28px;
  color:#00ff99;
}

input{
  width:100%;
  padding:12px;
  border-radius:8px;
  border:none;
  margin:6px 0;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  margin-top:10px;
  font-size:15px;
  background:#2ecc71;
  color:white;
}

.crypto-row{
  display:flex;
  justify-content:space-between;
  margin:10px 0;
}

.history{
  font-size:13px;
  color:#ccc;
}

.notice{
  background:#222;
  padding:10px;
  border-radius:8px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">GLOBAL TRUST BANK</div>

<div class="card">
  <div>Account No: <span id="acc"></span></div>
</div>

<div class="card">
  <div>Available Balance</div>
  <div id="balance" class="balance">$10,000,000</div>
</div>

<div class="card">
  <input id="amount" placeholder="Enter amount">
  <button onclick="deposit()">Deposit</button>
  <button onclick="withdraw()">Withdraw</button>
</div>

<div class="card">
  <h3>Transfer</h3>
  <input id="accNum" placeholder="Account Number">
  <input id="pin" placeholder="Enter PIN">
  <button onclick="sendMoney()">Send Money</button>
</div>

<div class="card">
  <h3>Crypto Market</h3>

  <div class="crypto-row">
    <span>BTC</span><span id="btc"></span>
  </div>

  <div class="crypto-row">
    <span>ETH</span><span id="eth"></span>
  </div>

  <div class="crypto-row">
    <span>XRP</span><span id="xrp"></span>
  </div>

</div>

<div class="card">
  <h3>Transaction History</h3>
  <div id="history" class="history"></div>
</div>

<div class="card">
  <h3>Support</h3>
  <div>globaltrustsupport@gmail.com</div>
</div>

<div id="notice"></div>

</div>

<script>
let balance = 10000000;
let history = [];
let userPin = "1234";

document.getElementById("acc").innerText =
  Math.floor(1000000000 + Math.random()*9000000000);

function update(){
  document.getElementById("balance").innerText =
    "$" + balance.toLocaleString();

  document.getElementById("history").innerHTML =
    history.slice().reverse().join("<br>");
}

function notify(msg){
  document.getElementById("notice").innerHTML =
    "<div class='notice'>"+msg+"</div>";
}

function deposit(){
  let amt = Number(amount.value);
  balance += amt;
  history.push("Deposited $" + amt);
  notify("Deposit successful");
  update();
}

function withdraw(){
  let amt = Number(amount.value);
  balance -= amt;
  history.push("Withdrew $" + amt);
  notify("Withdrawal successful");
  update();
}

function sendMoney(){
  if(pin.value !== userPin){
    notify("Wrong PIN");
    return;
  }
  let amt = Number(amount.value);
  balance -= amt;
  history.push("Sent $" + amt + " to " + accNum.value);
  notify("Transfer successful");
  update();
}

/* FAKE LIVE CRYPTO */
function crypto(){
  document.getElementById("btc").innerText =
    "$" + (78000 + Math.random()*1000).toFixed(0);

  document.getElementById("eth").innerText =
    "$" + (2300 + Math.random()*200).toFixed(0);

  document.getElementById("xrp").innerText =
    "$" + (0.5 + Math.random()*0.2).toFixed(2);
}

setInterval(crypto,2000);

update();
crypto();
</script>

</body>
</html>
