<!DOCTYPE html>
<html>
<head>
  <title>Global Trust Bank</title>
 <style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f5f5;
}

.app {
  padding: 20px;
}

.balance-card {
  background: linear-gradient(135deg, #6a11cb, #2575fc);
  color: white;
  padding: 20px;
  border-radius: 15px;
  margin-bottom: 20px;
}

.balance-card h1 {
  margin: 10px 0;
}

.balance-card button {
  background: white;
  color: #2575fc;
  border: none;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
}

.actions {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

.actions button {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #2575fc;
  color: white;
  font-size: 16px;
}

.history {
  background: white;
  padding: 15px;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="app">

  <h2>Hi, Thomas</h2>

  <!-- BALANCE CARD -->
  <div class="balance-card">
    <p>Available Balance</p>
    <h1>$<span id="balance">0</span></h1>
    <button onclick="deposit()">Add Money</button>
  </div>

  <!-- ACTION BUTTONS -->
  <div class="actions">
    <button onclick="deposit()">Deposit</button>
    <button onclick="withdraw()">Withdraw</button>
  </div>

  <!-- HISTORY -->
  <div class="history">
    <h3>Transaction History</h3>
    <ul id="history"></ul>
  </div>

</div>

</body>

</div>

<script>
let balance = 0;
let history = [];

function login() {
  let user = document.getElementById("username").value;
  let pass = document.getElementById("password").value;

  if (user === "admin" && pass === "1234") {
    document.getElementById("loginSection").style.display = "none";
    document.getElementById("bankSection").style.display = "block";

    loadData();
  } else {
    alert("Wrong login details");
  }
}

function loadData() {
  balance = Number(localStorage.getItem("balance")) || 5000;
  history = JSON.parse(localStorage.getItem("history")) || [];

  updateUI();
}

function saveData() {
  localStorage.setItem("balance", balance);
  localStorage.setItem("history", JSON.stringify(history));
}

function updateUI() {
  document.getElementById("balance").innerText = balance;

  let list = document.getElementById("history");
  list.innerHTML = "";

  history.forEach(item => {
    let li = document.createElement("li");
    li.innerText = item;
    list.appendChild(li);
  });
}

function deposit() {
  let amount = Number(document.getElementById("amount").value);
  if (!amount) return;

  balance += amount;
  history.push("Deposited $" + amount);

  saveData();
  updateUI();
}

function withdraw() {
  let amount = Number(document.getElementById("amount").value);
  if (!amount) return;

  balance -= amount;
  history.push("Withdrew $" + amount);

  saveData();
  updateUI();
}
</script>
</body>
</html>
