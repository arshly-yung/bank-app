<!DOCTYPE html>
<html>
<head>
  <title>Global Trust Bank</title>
 <style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f2f2f7;
}

.container {
  padding: 15px;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.card {
  background: linear-gradient(135deg, #7b2ff7, #3a7bd5);
  color: white;
  padding: 20px;
  border-radius: 15px;
  margin-top: 15px;
}

.card-top {
  display: flex;
  justify-content: space-between;
  font-size: 14px;
}

.card h1 {
  margin: 10px 0;
  font-size: 28px;
}

.add-btn {
  background: white;
  color: #3a7bd5;
  border: none;
  padding: 10px 15px;
  border-radius: 20px;
  font-weight: bold;
}

.services {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-top: 20px;
}

.service {
  background: white;
  padding: 15px 5px;
  border-radius: 10px;
  text-align: center;
  font-size: 14px;
}

.service p {
  margin-top: 5px;
  font-size: 12px;
}
</style>

</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <h2>Hi, Thomas</h2>
    <span class="bell">🔔</span>
  </div>

  <!-- BALANCE CARD -->
  <div class="card">
    <div class="card-top">
      <span>Available Balance</span>
      <span>👁️</span>
    </div>
    <h1>$5,000,000.00</h1>
    <button class="add-btn">Add Money</button>
  </div>

  <!-- SERVICES -->
  <div class="services">

    <div class="service">🏦<p>To Bank</p></div>
    <div class="service">📱<p>Airtime</p></div>
    <div class="service">💾<p>Savings</p></div>
    <div class="service">💳<p>Card</p></div>

    <div class="service">🌐<p>Data</p></div>
    <div class="service">⚡<p>Electricity</p></div>
    <div class="service">🎯<p>Betting</p></div>
    <div class="service">➕<p>More</p></div>

  </div>

</div>

</body>

</div>

<script>
let balance = 0;
let history = [];

function login() {
  let user = document.getElementById("username").value;
  let pass = document.getElementById("password").value;

  if (user === "admin" && pass === "1234") {
    document.getElementById("loginSection").style.display = "none";
    document.getElementById("bankSection").style.display = "block";

    loadData();
  } else {
    alert("Wrong login details");
  }
}

function loadData() {
  balance = Number(localStorage.getItem("balance")) || 5000;
  history = JSON.parse(localStorage.getItem("history")) || [];

  updateUI();
}

function saveData() {
  localStorage.setItem("balance", balance);
  localStorage.setItem("history", JSON.stringify(history));
}

function updateUI() {
  document.getElementById("balance").innerText = balance;

  let list = document.getElementById("history");
  list.innerHTML = "";

  history.forEach(item => {
    let li = document.createElement("li");
    li.innerText = item;
    list.appendChild(li);
  });
}

function deposit() {
  let amount = Number(document.getElementById("amount").value);
  if (!amount) return;

  balance += amount;
  history.push("Deposited $" + amount);

  saveData();
  updateUI();
}

function withdraw() {
  let amount = Number(document.getElementById("amount").value);
  if (!amount) return;

  balance -= amount;
  history.push("Withdrew $" + amount);

  saveData();
  updateUI();
}
</script>
</body>
</html>
