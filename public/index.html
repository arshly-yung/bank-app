<!DOCTYPE html>
<html>
<head>
  <title>Global Trust Bank</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f1a;
      color: white;
    }

    .container {
      padding: 20px;
    }

    .login-card {
      max-width: 350px;
      margin: 100px auto;
      padding: 20px;
      background: #1c1c2e;
      border-radius: 10px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 5px;
      background: #333;
      color: white;
    }

    button {
      padding: 12px;
      border: none;
      border-radius: 5px;
      background: #6c5ce7;
      color: white;
      cursor: pointer;
      width: 100%;
      margin-top: 10px;
    }

    .card {
      background: linear-gradient(90deg, #3a0ca3, #4361ee);
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    .actions button {
      margin-top: 5px;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- LOGIN -->
  <div id="loginSection" class="login-card">
    <h2>Global Trust Bank</h2>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" style="display:none;">
    <h3>Hi, <span id="userDisplay"></span></h3>

    <div class="card">
      <h4>Available Balance</h4>
      <h2 id="balance">$0</h2>
    </div>

    <input type="number" id="amount" placeholder="Enter amount">

    <div class="actions">
      <button onclick="deposit()">Deposit</button>
      <button onclick="withdraw()">Withdraw</button>
    </div>
  </div>

</div>

<script>
let users = JSON.parse(localStorage.getItem("users")) || {
  "thomas": { password: "1234", balance: 5000000 },
  "shinichi": { password: "1111", balance: 10000000 }
};

let currentUser = null;
let balance = 0;

function saveData() {
  localStorage.setItem("users", JSON.stringify(users));
}

function login() {
  let user = document.getElementById("username").value.toLowerCase();
  let pass = document.getElementById("password").value;

  if (users[user] && users[user].password === pass) {
    currentUser = user;
    balance = users[user].balance;

    document.getElementById("userDisplay").innerText = user;

    updateBalance();

    document.getElementById("loginSection").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
  } else {
    alert("Wrong login details");
  }
}

function updateBalance() {
  document.getElementById("balance").innerText =
    "$" + balance.toLocaleString();
}

function deposit() {
  let amount = Number(document.getElementById("amount").value);

  if (amount > 0) {
    balance += amount;
    users[currentUser].balance = balance;

    saveData();
    updateBalance();
  }
}

function withdraw() {
  let amount = Number(document.getElementById("amount").value);

  if (amount > 0 && amount <= balance) {
    balance -= amount;
    users[currentUser].balance = balance;

    saveData();
    updateBalance();
  } else {
    alert("Invalid amount");
  }
}
</script>

</body>
</html>
