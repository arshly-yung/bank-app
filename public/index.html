<!DOCTYPE html>
<html>
<head>
  <title>Global Trust Bank</title>
  <style>
    body {
      font-family: Arial;
      background: #eef2f7;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 12px;
      width: 300px;
      text-align: center;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    .balance {
      background: #2c3e9f;
      color: white;
      padding: 15px;
      border-radius: 10px;
      margin: 15px 0;
      font-size: 20px;
    }

    input {
      padding: 10px;
      width: 90%;
      margin: 10px 0;
    }

    button {
      padding: 10px;
      margin: 5px;
      border: none;
      color: white;
      cursor: pointer;
      border-radius: 5px;
      width: 45%;
    }

    .deposit { background: green; }
    .withdraw { background: red; }
  </style>
</head>

<body>

<div class="card">
  <h2>Global Trust Bank</h2>

  <div class="balance">
    $<span id="balance">5000</span>
  </div>

  <input type="number" id="amount" placeholder="Enter amount">

  <br>

  <button class="deposit" onclick="deposit()">Deposit</button>
  <button class="withdraw" onclick="withdraw()">Withdraw</button>

  <h3>Transaction History</h3>
  <ul id="history"></ul>
</div>

<script>
let balance = 5000;
let history = [];

function updateUI() {
  document.getElementById("balance").innerText = balance;

  let list = document.getElementById("history");
  list.innerHTML = "";

  history.forEach(item => {
    let li = document.createElement("li");
    li.innerText = item;
    list.appendChild(li);
  });
}

function deposit() {
  let amount = Number(document.getElementById("amount").value);
  if (!amount) return;

  balance += amount;
  history.push("Deposited $" + amount);
  updateUI();
}

function withdraw() {
  let amount = Number(document.getElementById("amount").value);
  if (!amount) return;

  balance -= amount;
  history.push("Withdrew $" + amount);
  updateUI();
}

updateUI();
</script>

</body>
</html>
