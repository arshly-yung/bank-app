<!DOCTYPE html>
<html>
<head>
  <title>Global Trust Bank</title>
  <style>
    body {
      font-family: Arial;
      background: #eef2f7;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 12px;
      width: 300px;
      text-align: center;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    .balance {
      background: #2c3e9f;
      color: white;
      padding: 15px;
      border-radius: 10px;
      margin: 15px 0;
      font-size: 20px;
    }

    input {
      padding: 10px;
      width: 90%;
      margin: 10px 0;
    }

    button {
      padding: 10px;
      margin: 5px;
      border: none;
      color: white;
      cursor: pointer;
      border-radius: 5px;
      width: 45%;
    }

    .deposit { background: green; }
    .withdraw { background: red; }
  </style>
</head>

<body>

<div class="card">

  <h2>Global Trust Bank</h2>

  <!-- LOGIN -->
  <div id="loginSection">
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <br>
    <button onclick="login()">Login</button>
  </div>

  <!-- BANK -->
  <div id="bankSection" style="display:none;">

    <div class="balance">
      $<span id="balance">0</span>
    </div>

    <input type="number" id="amount" placeholder="Enter amount">
    <br>

    <button class="deposit" onclick="deposit()">Deposit</button>
    <button class="withdraw" onclick="withdraw()">Withdraw</button>

    <h3>Transaction History</h3>
    <ul id="history"></ul>

  </div>

</div>

<script>
let balance = 0;
let history = [];

function login() {
  let user = document.getElementById("username").value;
  let pass = document.getElementById("password").value;

  if (user === "admin" && pass === "1234") {
    document.getElementById("loginSection").style.display = "none";
    document.getElementById("bankSection").style.display = "block";

    loadData();
  } else {
    alert("Wrong login details");
  }
}

function loadData() {
  balance = Number(localStorage.getItem("balance")) || 5000;
  history = JSON.parse(localStorage.getItem("history")) || [];

  updateUI();
}

function saveData() {
  localStorage.setItem("balance", balance);
  localStorage.setItem("history", JSON.stringify(history));
}

function updateUI() {
  document.getElementById("balance").innerText = balance;

  let list = document.getElementById("history");
  list.innerHTML = "";

  history.forEach(item => {
    let li = document.createElement("li");
    li.innerText = item;
    list.appendChild(li);
  });
}

function deposit() {
  let amount = Number(document.getElementById("amount").value);
  if (!amount) return;

  balance += amount;
  history.push("Deposited $" + amount);

  saveData();
  updateUI();
}

function withdraw() {
  let amount = Number(document.getElementById("amount").value);
  if (!amount) return;

  balance -= amount;
  history.push("Withdrew $" + amount);

  saveData();
  updateUI();
}
</script>
</body>
</html>
